<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examiner Portal | MPSTME</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Blue-Purple Gradient matching your 'Design Experience Portal' image */
            background: linear-gradient(135deg, #2b32b2 0%, #1488cc 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
            border: none;
        }

        .uni-logo-header {
            height: 65px;
            width: auto;
            margin-bottom: 25px;
        }

        .portal-header h3 {
            color: #1e272e;
            font-weight: 800;
            font-size: 1.7rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .portal-header p {
            color: #808e9b;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.8rem;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .form-control {
            border-radius: 10px;
            padding: 14px;
            border: 1px solid #e5e7eb;
            background-color: #f9fafb;
            transition: all 0.2s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(20, 136, 204, 0.15);
            border-color: #1488cc;
            background-color: #ffffff;
        }

        /* Matches the Dark Button from your 'Faculty Portal' card */
        .btn-portal {
            background-color: #1e272e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-portal:hover {
            background-color: #000000;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .support-footer {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid #f3f4f6;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <img src="/static/images/university_logo.png" alt="University Logo" class="uni-logo-header">

    <div class="portal-header">
        <h3>Examiner Portal</h3>
        <p>Narsee Monjee Institute of Management Studies</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger py-2 mb-4 text-start border-0 shadow-sm" style="background-color: #fff5f5; color: #c0392b;">
                <i class="fas fa-exclamation-triangle me-2"></i> {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="text-start">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" required placeholder="example@nmims.edu">
        </div>

        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <label class="form-label">Password</label>
                <a href="{% url 'password_reset' %}" class="text-decoration-none small text-muted">Forgot?</a>
            </div>
            <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-portal">
            Login as Examiner <i class="fas fa-chevron-right ms-2"></i>
        </button>
    </form>

    <div class="support-footer text-muted">
        <div class="d-flex justify-content-center gap-3 mb-3">


        </div>
        <p class="mb-0" style="font-size: 0.75rem;">&copy; 2026 SVKM's NMIMS </p>
    </div>
</div>

</body>
</html>
