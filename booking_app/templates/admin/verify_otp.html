<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | Examiner Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2b32b2 0%, #1488cc 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .otp-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            border: none;
            text-align: center;
        }

        .icon-shield {
            font-size: 3rem;
            color: #1488cc;
            margin-bottom: 20px;
        }

        .portal-header h3 {
            color: #1e272e;
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .portal-header p {
            color: #808e9b;
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .otp-input {
            letter-spacing: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            border-radius: 12px;
            padding: 15px;
            border: 2px solid #e5e7eb;
            background-color: #f9fafb;
            transition: all 0.2s;
        }

        .otp-input:focus {
            border-color: #1488cc;
            box-shadow: 0 0 0 4px rgba(20, 136, 204, 0.1);
            background-color: #ffffff;
            outline: none;
        }

        .btn-verify {
            background-color: #1e272e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: 700;
            width: 100%;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-verify:hover {
            background-color: #000000;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .resend-text {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #808e9b;
        }

        .alert-custom {
            border-radius: 10px;
            font-size: 0.85rem;
            background-color: #fff5f5;
            color: #c0392b;
            border: none;
        }
    </style>
</head>
<body>

<div class="otp-card">
    <div class="icon-shield">
        <i class="fas fa-user-shield"></i>
    </div>

    <div class="portal-header">
        <h3>Two-Step Verification</h3>
        <p>Please enter the 6-digit code sent to your registered NMIMS email address.</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger alert-custom py-2 mb-4">
                <i class="fas fa-exclamation-circle me-2"></i> {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <input type="text" name="otp" class="form-control otp-input"
                   placeholder="000000" maxlength="6" required autofocus>
        </div>

        <button type="submit" class="btn btn-verify">
            Verify & Proceed <i class="fas fa-check-circle ms-2"></i>
        </button>
    </form>

    <div class="resend-text">
        Didn't receive the code?
        <br>
        <a href="{% url 'faculty_login' %}" class="text-decoration-none fw-bold" style="color: #1488cc;">
            Try Logging in again
        </a>
    </div>

    <div class="mt-4 pt-3 border-top text-muted" style="font-size: 0.7rem;">
        &copy; 2026 SVKM's NMIMS | Secure DOE Access
    </div>
</div>

</body>
</html>
