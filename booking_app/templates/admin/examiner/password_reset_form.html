<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Examiner Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2b32b2 0%, #1488cc 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
            border: none;
            text-align: center;
        }

        .icon-lock {
            font-size: 3rem;
            color: #2b32b2;
            margin-bottom: 20px;
        }

        .portal-header h3 {
            color: #1e272e;
            font-weight: 800;
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        .portal-header p {
            color: #808e9b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.8rem;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: block;
            text-align: left;
        }

        .form-control {
            border-radius: 10px;
            padding: 14px;
            border: 1px solid #e5e7eb;
            background-color: #f9fafb;
        }

        .btn-reset {
            background-color: #1e272e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            background-color: #000000;
            transform: translateY(-2px);
        }

        .back-to-login {
            margin-top: 25px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="reset-card">
    <div class="icon-lock">
        <i class="fas fa-unlock-alt"></i>
    </div>

    <div class="portal-header">
        <h3>Forgot Password?</h3>
        <p>Enter your NMIMS email address and we'll send you a link to reset your password.</p>
    </div>

    <form method="POST" class="text-start">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" required placeholder="name@nmims.edu">
        </div>

        <button type="submit" class="btn btn-reset">
            Send Reset Link <i class="fas fa-paper-plane ms-2"></i>
        </button>
    </form>

    <div class="back-to-login">
        <a href="{% url 'faculty_login' %}" class="text-decoration-none text-muted">
            <i class="fas fa-arrow-left me-1"></i> Back to Login
        </a>
    </div>

    <div class="mt-4 pt-3 border-top text-muted" style="font-size: 0.7rem;">
        &copy; 2026 SVKM's NMIMS
    </div>
</div>

</body>
</html>
