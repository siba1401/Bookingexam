<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | Examiner Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2b32b2 0%, #1488cc 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
            border: none;
            text-align: center;
        }

        .icon-envelope {
            font-size: 3.5rem;
            color: #1488cc;
            margin-bottom: 25px;
        }

        .portal-header h3 {
            color: #1e272e;
            font-weight: 800;
            font-size: 1.6rem;
            margin-bottom: 15px;
        }

        .portal-header p {
            color: #808e9b;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-return {
            background-color: #1e272e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-weight: 700;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-return:hover {
            background-color: #000000;
            color: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon-envelope">
        <i class="fas fa-envelope-open-text"></i>
    </div>

    <div class="portal-header">
        <h3>Check Your Email</h3>
        <p>We've emailed you instructions for setting your password. If an account exists with the email you entered, you should receive it shortly.</p>
        <p class="small text-muted">Be sure to check your spam folder if you don't see it in your inbox.</p>
    </div>

    <a href="{% url 'faculty_login' %}" class="btn-return">
        Return to Login
    </a>

    <div class="mt-4 pt-3 border-top text-muted" style="font-size: 0.75rem;">
        &copy; 2026 SVKM's NMIMS | DOE Management
    </div>
</div>

</body>
</html>
