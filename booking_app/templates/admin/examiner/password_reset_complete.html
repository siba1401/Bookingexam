<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed | Examiner Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2b32b2 0%, #1488cc 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .complete-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
            border: none;
            text-align: center;
        }

        .icon-success {
            font-size: 4rem;
            color: #2ecc71;
            margin-bottom: 25px;
        }

        .portal-header h3 {
            color: #1e272e;
            font-weight: 800;
            font-size: 1.6rem;
            margin-bottom: 15px;
        }

        .portal-header p {
            color: #808e9b;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .btn-login {
            background-color: #1e272e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: 700;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background-color: #000000;
            color: #ffffff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="complete-card">
    <div class="icon-success">
        <i class="fas fa-check-circle"></i>
    </div>

    <div class="portal-header">
        <h3>Password Reset Complete</h3>
        <p>Your password has been set. You may now log in with your new credentials.</p>
    </div>

    <a href="{% url 'faculty_login' %}" class="btn-login">
        Log In Now <i class="fas fa-sign-in-alt ms-2"></i>
    </a>

    <div class="mt-4 pt-3 border-top text-muted" style="font-size: 0.75rem;">
        &copy; 2026 SVKM's NMIMS | MPSTME DOE
    </div>
</div>

</body>
</html>
